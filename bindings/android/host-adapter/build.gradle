plugins {
    id 'java'
}

group = 'com.reader.core'
version = '0.1.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

sourceSets {
    // Compile against the existing Java JNI wrapper (ReaderCoreRuntime /
    // NativeCoreBridge / ReaderCoreException) so ReaderCoreHostTransport — the
    // production wiring from the host adapter to the C ABI surface — type-checks
    // under a plain JVM. We do not modify those sources; we only reference them.
    main {
        java {
            srcDir '../src/main/java'
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
    testLogging {
        events 'passed', 'skipped', 'failed'
    }
    // Point ProtocolConformanceTest at the upstream protocol fixtures dir (the
    // source of truth) so a protocol change breaks the test, instead of relying
    // on copied fixtures under src/test/resources. Resolved relative to this
    // module's project dir: bindings/android/host-adapter -> repo root.
    systemProperty 'reader.protocol.fixtures.host',
            new File(rootProject.projectDir, '../../../protocol/fixtures/conformance/host').absolutePath
}

// Compile-gate the runnable wiring sample (HostBusSample). Running it needs the
// JNI .so (System.loadLibrary in NativeCoreBridge's static init), so it is not
// unit-tested; but compiling it type-checks the full access-path wiring —
// host-adapter + JNI wrapper + capability handlers — under a plain JVM. This is
// the verifiable contract evidence for the access path's concrete wiring.
sourceSets {
    samples {
        java {
            srcDir 'src/samples/java'
        }
        compileClasspath += sourceSets.main.output
    }
}

dependencies {
    samplesCompileOnly sourceSets.main.output
}

tasks.register('compileSample', JavaCompile) {
    source = sourceSets.samples.java
    classpath = sourceSets.main.compileClasspath + sourceSets.main.output
    destinationDirectory = layout.buildDirectory.dir('classes/java/sample')
}

tasks.named('check') {
    dependsOn 'compileSample'
}
